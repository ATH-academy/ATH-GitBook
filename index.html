<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="All Time High Academy — product documentation: courses, memberships, certifications, and admin tools." />
  <meta name="theme-color" content="#050708" />
  <title>ATH Academy — Documentation</title>
  <link rel="icon" type="image/png" href="images/ath-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <!-- dark.css = dark shell; ATH tokens below override colors -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css" />
  <style>
    :root {
      --docsify-theme-color: #00e89a;
      --ath-bg-deep: #050708;
      --ath-bg-mid: #0a1012;
      --ath-surface: #0d1316;
      --ath-surface-elevated: #121a1e;
      --ath-border: rgba(0, 255, 167, 0.12);
      --ath-border-soft: rgba(255, 255, 255, 0.06);
      --ath-text: #e8f4ef;
      --ath-muted: #8aa99a;
      --ath-mint: #00ffa7;
      --ath-mint-dim: rgba(0, 255, 167, 0.14);
      --ath-cyan: #00d4ff;
      --ath-glow: rgba(0, 255, 167, 0.35);
      --ath-masthead-h: 3.25rem;
    }

    * {
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
      background: var(--ath-bg-deep);
      scroll-padding-top: calc(var(--ath-masthead-h) + 1rem);
    }

    body {
      margin: 0;
      font-family: "Source Sans 3", system-ui, sans-serif;
      background: var(--ath-bg-deep);
      color: var(--ath-text);
      min-height: 100vh;
    }

    /* Layered ATH-style backdrop: depth + mint/cyan aurora + subtle grid */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -2;
      background:
        radial-gradient(ellipse 120% 80% at 50% -30%, rgba(0, 255, 167, 0.16), transparent 55%),
        radial-gradient(ellipse 70% 50% at 100% 20%, rgba(0, 212, 255, 0.09), transparent 45%),
        radial-gradient(ellipse 60% 40% at 0% 80%, rgba(0, 255, 167, 0.06), transparent 50%),
        linear-gradient(165deg, var(--ath-bg-deep) 0%, var(--ath-bg-mid) 45%, #060c0e 100%);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      opacity: 0.45;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 85% 70% at 50% 40%, black 20%, transparent 70%);
    }

    /* Branded masthead */
    .ath-masthead {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--ath-masthead-h);
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 0 1rem 0 1.1rem;
      background: linear-gradient(180deg, rgba(5, 7, 8, 0.92) 0%, rgba(8, 14, 16, 0.88) 100%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--ath-border-soft);
      box-shadow: 0 1px 0 rgba(0, 255, 167, 0.08);
    }

    .ath-masthead::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--ath-mint), var(--ath-cyan), transparent);
      opacity: 0.55;
    }

    .ath-masthead__brand {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      text-decoration: none;
      color: inherit;
    }

    .ath-masthead__logo {
      display: block;
      height: 2rem;
      width: auto;
      max-width: 7.5rem;
      object-fit: contain;
    }

    .ath-masthead__title {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--ath-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    #app {
      padding-top: var(--ath-masthead-h);
    }

    .sidebar {
      background: var(--ath-surface) !important;
      border-right: 1px solid var(--ath-border-soft) !important;
      padding-top: 0.5rem;
      top: var(--ath-masthead-h) !important;
      height: calc(100vh - var(--ath-masthead-h)) !important;
    }

    .sidebar-nav li a {
      color: var(--ath-muted);
      font-weight: 500;
    }

    .sidebar-nav li a:hover {
      color: var(--ath-mint);
    }

    .sidebar-nav li.active > a {
      color: var(--ath-mint);
      border-color: var(--ath-mint);
      font-weight: 600;
    }

    .app-name-link {
      font-family: Fraunces, Georgia, serif;
    }

    .search input {
      background: rgba(0, 255, 167, 0.06) !important;
      border: 1px solid var(--ath-border-soft) !important;
      color: var(--ath-text) !important;
    }

    .search .search-keyword {
      color: var(--ath-mint);
    }

    .app,
    .content,
    body,
    main,
    #main {
      background: transparent !important;
    }

    #app .app {
      background: transparent !important;
    }

    .content {
      padding-top: 0.5rem;
    }

    /* Docsify search / mobile panels inherit dark surface */
    .search .search-result,
    .search .matching-post,
    .sidebar-toggle,
    body.close .sidebar,
    .sidebar-toggle-button {
      background: var(--ath-surface) !important;
      color: var(--ath-text) !important;
    }

    .markdown-section {
      max-width: 52rem;
      font-size: 1.05rem;
      line-height: 1.65;
      background: transparent !important;
      color: var(--ath-text);
    }

    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3 {
      font-family: Fraunces, Georgia, serif;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #f2faf7;
    }

    .markdown-section h1 {
      font-size: 2.1rem;
      margin-top: 0;
    }

    .markdown-section h2 {
      margin-top: 2.25rem;
      padding-bottom: 0.35rem;
      border-bottom: 1px solid var(--ath-border-soft);
    }

    .markdown-section a {
      color: #7dffd4;
      text-decoration-color: rgba(0, 255, 167, 0.4);
    }

    .markdown-section a:hover {
      color: var(--ath-mint);
    }

    .markdown-section table {
      display: block;
      overflow-x: auto;
      border-collapse: collapse;
    }

    .markdown-section th,
    .markdown-section td {
      border: 1px solid var(--ath-border-soft);
      padding: 0.5rem 0.75rem;
    }

    .markdown-section th {
      background: var(--ath-mint-dim);
      color: #f2faf7;
    }

    .markdown-section tr:nth-child(even) {
      background: rgba(0, 255, 167, 0.03);
    }

    .markdown-section code {
      background: rgba(0, 255, 167, 0.12);
      color: #b8ffe8;
      border-radius: 4px;
      padding: 0.12em 0.35em;
    }

    .markdown-section pre {
      background: var(--ath-surface-elevated) !important;
      border: 1px solid var(--ath-border-soft);
      border-radius: 10px;
    }

    .markdown-section pre code {
      background: transparent;
      color: #d4ebe3;
    }

    .docsify-callout {
      border-radius: 10px;
      padding: 1rem 1.15rem;
      margin: 1.25rem 0;
      border: 1px solid var(--ath-border-soft);
      background: rgba(0, 0, 0, 0.2);
    }

    .docsify-callout p {
      margin: 0;
    }

    .docsify-callout p + p {
      margin-top: 0.5rem;
    }

    .docsify-callout--success {
      border-color: rgba(0, 255, 167, 0.35);
      background: rgba(0, 255, 167, 0.08);
    }

    .docsify-callout--info {
      border-color: rgba(0, 212, 255, 0.35);
      background: rgba(0, 212, 255, 0.08);
    }

    .docsify-callout--warning {
      border-color: rgba(255, 200, 100, 0.45);
      background: rgba(255, 180, 60, 0.1);
    }

    .markdown-section blockquote {
      border-left: 3px solid var(--ath-mint);
      background: rgba(0, 255, 167, 0.05);
      color: var(--ath-muted);
      margin: 1rem 0;
      padding: 0.5rem 1rem;
      border-radius: 0 8px 8px 0;
    }
  </style>
</head>
<body>
  <header class="ath-masthead" role="banner">
    <a class="ath-masthead__brand" href="#/" title="Documentation home">
      <img
        class="ath-masthead__logo"
        src="images/ath-logo.png"
        width="120"
        height="40"
        alt="All Time High Academy"
      />
      <span class="ath-masthead__title">Academy Docs</span>
    </a>
  </header>
  <div id="app"></div>
  <script>
    (function () {
      var host = location.hostname;
      var path = location.pathname.split("/").filter(Boolean);
      if (host.endsWith("github.io") && path.length >= 1) {
        window.$docsify = window.$docsify || {};
        window.$docsify.basePath = "/" + path[0] + "/";
      }
    })();

    window.$docsify = Object.assign(window.$docsify || {}, {
      name: "All Time High Academy",
      loadSidebar: "sidebar.md",
      homepage: "README.md",
      auto2top: true,
      maxLevel: 4,
      subMaxLevel: 3,
      search: {
        maxAge: 86400000,
        paths: "auto",
        placeholder: "Search documentation…",
        noData: "No results.",
        depth: 3,
      },
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
